name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  GO_VERSION: '1.21'
  TASKS_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/tasks-service
  AUTH_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/auth-service

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine latest practice directory
        id: latest-dir
        run: |
          dirs=$(ls -d [0-9]* 2>/dev/null | sort -n)
          if [ -z "$dirs" ]; then
            echo "No numbered directories found. Exiting."
            exit 1
          fi
          latest=$(echo "$dirs" | tail -n1)
          echo "Latest practice directory: $latest"
          echo "BASE_DIR=$latest" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles(format('{0}/**/go.sum', env.BASE_DIR)) }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run lint for auth
        working-directory: ${{ env.BASE_DIR }}
        run: go vet ./services/auth/...

      - name: Run tests for auth
        working-directory: ${{ env.BASE_DIR }}
        run: go test -short ./services/auth/... || echo "No tests found"

      - name: Run lint for tasks
        working-directory: ${{ env.BASE_DIR }}
        run: go vet -short ./services/tasks/... || echo "No tests found"

      - name: Run tests for tasks
        working-directory: ${{ env.BASE_DIR }}
        run: go test -short ./services/tasks/... || echo "No tests found"

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine latest practice directory
        id: latest-dir
        run: |
          dirs=$(ls -d [0-9]* 2>/dev/null | sort -n)
          if [ -z "$dirs" ]; then
            echo "No numbered directories found. Exiting."
            exit 1
          fi
          latest=$(echo "$dirs" | tail -n1)
          echo "Latest practice directory: $latest"
          echo "BASE_DIR=$latest" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles(format('{0}/**/go.sum', env.BASE_DIR)) }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build auth binary
        working-directory: ${{ env.BASE_DIR }}
        run: go build -o auth-server ./services/auth/cmd/auth

      - name: Build tasks binary
        working-directory: ${{ env.BASE_DIR }}
        run: go build -o tasks-server ./services/tasks/cmd/tasks

      - name: Upload auth binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-binary
          path: ${{ env.BASE_DIR }}/auth-server

      - name: Upload tasks binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasks-binary
          path: ${{ env.BASE_DIR }}/tasks-server

  docker:
    name: Build and Push Docker images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine latest practice directory
        id: latest-dir
        run: |
          dirs=$(ls -d [0-9]* 2>/dev/null | sort -n)
          if [ -z "$dirs" ]; then
            echo "No numbered directories found. Exiting."
            exit 1
          fi
          latest=$(echo "$dirs" | tail -n1)
          echo "Latest practice directory: $latest"
          echo "BASE_DIR=$latest" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tags_auth=${{ env.AUTH_IMAGE_NAME }}:$VERSION,${{ env.AUTH_IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
          echo "tags_tasks=${{ env.TASKS_IMAGE_NAME }}:$VERSION,${{ env.TASKS_IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: Build and push auth image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BASE_DIR }}
          file: ${{ env.BASE_DIR }}/services/auth/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags_auth }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push tasks image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BASE_DIR }}
          file: ${{ env.BASE_DIR }}/services/tasks/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags_tasks }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

