name: go-4

include:
  - monitoring/docker-compose.monitoring.yml
  - tls/docker-compose.tls.yml

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_pass
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    networks:
      - app-network

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: auth-service
    environment:
      - AUTH_PORT=8081
      - AUTH_GRPC_PORT=50051
    ports:
      - "8081:8081"  # HTTP
      - "50051:50051"  # gRPC
    networks:
      - app-network

  tasks:
    build:
      context: ..
      dockerfile: services/tasks/Dockerfile
    container_name: tasks-service
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=tasks_user
      - DB_PASSWORD=tasks_pass
      - DB_NAME=tasks_db
    ports:
      - "8082:8082"  # HTTP (/tasks)
    depends_on:
      - auth
      - postgres
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:

