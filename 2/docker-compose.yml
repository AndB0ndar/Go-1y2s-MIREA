name: go-2

services:
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: auth-service
    environment:
      - AUTH_PORT=8081
      - AUTH_GRPC_PORT=50051
    ports:
      - "8081:8081"  # HTTP
      - "50051:50051"  # gRPC
    networks:
      - app-network

  tasks:
    build:
      context: .
      dockerfile: services/tasks/Dockerfile
    container_name: tasks-service
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
    ports:
      - "8082:8082"  # HTTP (/tasks)
    depends_on:
      - auth
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
