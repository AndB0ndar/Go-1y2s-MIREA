apiVersion: v1
kind: ConfigMap
metadata:
  name: tasks-config
data:
  TASKS_PORT: "8082"
  AUTH_GRPC_ADDR: "host.docker.internal:50051"
  DB_HOST: "host.docker.internal"
  DB_PORT: "5432"
  DB_USER: "tasks_user"
  DB_NAME: "tasks_db"
  REDIS_ADDR: "host.docker.internal:6379"
  CACHE_TTL_SECONDS: "120"
  CACHE_TTL_JITTER_SECONDS: "30"
  LOG_LEVEL: "info"
  INSTANCE_ID: "tasks-k8s"

#host.docker.internal - for windows and mac, on linux use ip
