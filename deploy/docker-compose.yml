name: go-4

include:
  - monitoring/docker-compose.monitoring.yml
  - tls/docker-compose.tls.yml

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_pass
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks_user -d tasks_db"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: auth-service
    environment:
      - AUTH_PORT=8081
      - AUTH_GRPC_PORT=50051
    ports:
      - "8081:8081"  # HTTP
      - "50051:50051"  # gRPC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  tasks:
    build:
      context: ..
      dockerfile: services/tasks/Dockerfile
    container_name: tasks-service
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=tasks_user
      - DB_PASSWORD=tasks_pass
      - DB_NAME=tasks_db
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
    ports:
      - "8082:8082"  # HTTP (/tasks)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:

